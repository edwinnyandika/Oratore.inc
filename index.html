    <script>
      window.tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
              heading: ['Outfit', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
              signature: ['Alex Brush', 'cursive'],
            },
            colors: {
              cream: {
                DEFAULT: '#F5F3ED',
                dark: '#E8E6D9',
              },
              charcoal: {
                DEFAULT: '#1A1A1A',
                light: '#2C2C2C',
                deep: '#0F0F0F',
              },
              gold: {
                DEFAULT: '#F4CE6B',
                hover: '#E5BF5A',
              },
              brand: {
                primary: '#4f46e5',
                primaryLight: '#818cf8',
                secondary: '#0ea5e9',
                black: '#0f172a',
                dark: '#1e293b',
                grey: '#94a3b8',
                light: '#f8fafc',
                surface: '#ffffff',
              }
            },
            boxShadow: {
              'glow': '0 0 25px -5px rgba(244, 206, 107, 0.4)',
              'card': '0 4px 12px rgba(0, 0, 0, 0.08)',
              'card-hover': '0 20px 40px -5px rgba(0, 0, 0, 0.08), 0 10px 20px -5px rgba(0, 0, 0, 0.04)',
              'float': '0 10px 30px -10px rgba(79, 70, 229, 0.15)',
              'inner-light': 'inset 0 2px 4px 0 rgba(255, 255, 255, 0.3)',
              'crextio': '0 8px 30px rgba(0,0,0,0.04)',
              'crextio-dark': '0 8px 30px rgba(0,0,0,0.4)',
            },
            animation: {
              'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'blob': 'blob 10s infinite',
              'marquee': 'marquee 30s linear infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #F5F3ED;
        transition: background-color 0.3s ease, color 0.3s ease;
        min-height: 100vh;
      }
      
      html.dark body {
        background: #0F0F0F;
        color: #F8FAFC;
      }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .dark .glass-panel {
        background: rgba(26, 26, 26, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .glass-dark {
        background: rgba(26, 26, 26, 0.9);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .sheet-a4 { width: 210mm; min-height: 297mm; }
      .sheet-letter { width: 8.5in; min-height: 11in; }

      @media print {
        @page { margin: 0; size: auto; }
        body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .no-print { display: none !important; }
        .sheet-a4, .sheet-letter { margin: 0 auto !important; box-shadow: none !important; border: none !important; width: 100% !important; }
      }
    </style>
